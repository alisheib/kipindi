<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E33"/><stop offset="1" stop-color="#060A50"/>
    </linearGradient>
    <linearGradient id="gilt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FEC766"/><stop offset="1" stop-color="#D49824"/>
    </linearGradient>
    <pattern id="topo" width="240" height="180" patternUnits="userSpaceOnUse">
      <path d="M0 90 Q60 60 120 90 T240 90" fill="none" stroke="#F5F8FF" stroke-width="0.7"/>
      <path d="M0 50 Q80 20 160 50 T320 50" fill="none" stroke="#F5F8FF" stroke-width="0.7"/>
      <path d="M0 130 Q40 110 100 130 T220 130 T340 130" fill="none" stroke="#F5F8FF" stroke-width="0.7"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#topo)" opacity="0.06"/>
  <!-- 50 mark -->
  <g transform="translate(80,165.0)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="none" stroke="url(#gilt)" stroke-width="4"/>
    <text x="60" y="78" text-anchor="middle" font-family="Sora, Inter, system-ui, sans-serif"
          font-size="52" font-weight="800" fill="url(#gilt)">50</text>
  </g>
  <text x="80" y="373.0" font-family="Sora, Inter, system-ui, sans-serif" font-size="76"
        font-weight="700" fill="#F5F8FF" letter-spacing="-1">50pick</text>
  <text x="80" y="437.0" font-family="Sora, Inter, system-ui, sans-serif" font-size="34"
        font-weight="500">
    <tspan fill="#C8CBCF">The wisdom of </tspan><tspan fill="#00A24F" font-weight="700">YES</tspan><tspan fill="#C8CBCF"> &amp; </tspan><tspan fill="#E6424C" font-weight="700">NO</tspan><tspan fill="#C8CBCF">.</tspan>
  </text>
  <!-- YES/NO duality bar -->
  <g transform="translate(80,536)">
    <rect x="0" y="0" width="1040" height="10" rx="5" fill="#E6424C"/>
    <rect x="0" y="0" width="592.8" height="10" rx="5" fill="#00A24F"/>
  </g>
  <text x="1120" y="522" text-anchor="end" font-family="JetBrains Mono, monospace"
        font-size="20" fill="#C8CBCF" letter-spacing="3">PREDICT EVENTS · NOT CHANCE</text>
</svg>