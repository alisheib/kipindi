<!DOCTYPE html>
<html><head>
<style>
.live-dot {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  background: #e53e3e;
  animation: live-pulse 1.4s ease-in-out infinite;
}
@keyframes live-pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}
</style>
</head><body style="background:#0a0a1a;color:#fff;font:14px sans-serif;padding:40px">
<h3>If the red dot below pulses, CSS animations work in your browser:</h3>
<p><span class="live-dot"></span> This should pulse</p>
</body></html>
