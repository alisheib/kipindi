<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Hero() {
  return (
    <div className="spec-hero">
      <div>
        <div className="spec-hero-meta">MAPIGO · DESIGN SPEC v1.0 · for Kipindi</div>
        <h1>The match has a <em>pulse</em>.<br/>Now you can bet it.</h1>
        <p>
          Mapigo (Swahili: <em>"heartbeats / pulses"</em>) is the signature in-platform mini-game for Kipindi.
          Players watch a live intensity waveform of a real football match and call the next 60 seconds:
          will the pulse <strong style={{color:'var(--bet-hot)'}}>SPIKE</strong>, <strong style={{color:'var(--gold)'}}>DRIFT</strong>, or stay <strong style={{color:'var(--bet-cold)'}}>CALM</strong>?
          All stakes pool together; winners share by stake share.
        </p>
        <div className="spec-hero-tag">
          <span className="spec-hero-tag-en">"Feel the match. Bet the pulse."</span>
          <span style={{color:'var(--text-low)'}}>·</span>
          <span className="spec-hero-tag-sw">"Hisi mechi. Cheza mapigo."</span>
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'center'}}>
        <div style={{width:'100%', maxWidth: 360}}>
          <HubTilePortrait />
        </div>
      </div>
    </div>
  );
}

function Section({ num, title, sub, children }) {
  return (
    <section className="spec-section">
      <div className="spec-section-head">
        <div className="spec-section-num">{num}</div>
        <div className="spec-section-title">{title}</div>
        {sub && <div className="spec-section-sub">{sub}</div>}
      </div>
      {children}
    </section>
  );
}

const COLORS = [
  { name: 'mapigo.beat',          token: '--mapigo-beat',          hex: '#DEBC54' },
  { name: 'mapigo.beat-light',    token: '--mapigo-beat-light',    hex: '#B58A21' },
  { name: 'mapigo.beat-glow',     token: '--mapigo-beat-glow',     hex: 'rgba(240,206,106,0.85)' },
  { name: 'mapigo.spike',         token: '--mapigo-spike',         hex: '#E6633F' },
  { name: 'mapigo.drift',         token: '--mapigo-drift',         hex: '#DEBC54' },
  { name: 'mapigo.calm',          token: '--mapigo-calm',          hex: '#5BA9D6' },
  { name: 'mapigo.calm-fill',     token: '--mapigo-calm-fill',     hex: 'rgba(66,103,224,0.18)' },

];

const COPY = [

  { key: 'round.open',        en: 'Round open · Place your bet',                          sw: 'Raundi imefunguka · Weka dau lako' },

  { key: 'round.won',         en: 'You won! +{amt}',                                      sw: 'Umeshinda! +{amt}' },
  { key: 'round.lost',        en: 'No win this round',                                    sw: 'Hakuna ushindi raundi hii' },

const LIFECYCLE = [
  { num: '01', ttl: 'Pre-game',           copy: 'No live match selected. Show match picker. CTA: "Choose a match · Chagua mechi"' },
  { num: '02', ttl: 'Connecting',         copy: 'Animated waveform draws itself L→R while feed handshakes. Sub: "Inaunganisha kwa mechi…"' },
  { num: '03', ttl: 'Round open',         copy: '60s countdown active. Tray enabled. Pool counts increment live as others bet.' },
  { num: '04', ttl: 'Bet placed',         copy: 'Anchor diamond pops in at placement timestamp. Tray locks. One bet per round.' },
  { num: '05', ttl: 'Resolving',          copy: '5s server hold. Round band tints by outcome. All anchors freeze.' },
  { num: '06', ttl: 'Round resolved',     copy: 'Result card slides in. Balance updates. Streak updates. Feed prepends.' },
  { num: '07', ttl: 'Round closed (no bet)', copy: 'No card; band moves on. Greyed anchor placeholder breathes "place a bet".' },
  { num: '08', ttl: 'Goal scored',        copy: 'Full-screen GoalFlash override. Wordmark "GOAL" stamps 800ms. Haptic MAP_GOAL.' },

  { num: '14', ttl: 'Empty pool',         copy: 'Solo round still resolves at fallback ×rate. Pool indicator shows "low liquidity".' },

function App() {
  return (
    <DesignCanvas title="Mapigo — Design System & Game Spec" subtitle="v1.0 · ready for engineering handoff" minScale={0.2} maxScale={1.6} initialFit="width">
      <DCSection id="hero" title="Overview">
        <DCArtboard id="cover" label="Spec cover" width={1280} height={780}>
          <div className="spec" style={{padding:'48px 56px', gap:0}}>
            <Hero />
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="game" title="The game canvas (desktop · 1280×800)">
        <DCArtboard id="canvas-desktop" label="Game canvas — Round open, bet placed" width={1280} height={800}>
          <GameCanvas />
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile (390 × 844, mockup at 360 width)">

        </DCArtboard>
        <DCArtboard id="mobile-onboard" label="First-run onboarding (3 screens)" width={840} height={420}>

                <div className="logo-card-label">MONO · LIGHT</div>
                <MapigoWordmark height={40} color="#F5F1E6" accent="#F5F1E6" />
              </div>
              <div className="logo-card light">
                <div className="logo-card-label">MONO · DARK</div>
                <MapigoWordmark height={40} color="#1A1F2E" accent="#1A1F2E" />
              </div>
              <div className="logo-card dark">
                <div className="logo-card-label">GLYPH · 64px</div>
                <MapigoGlyph size={64} glow />
              </div>
              <div className="logo-card dark">
                <div className="logo-card-label">GLYPH · 32px</div>
                <MapigoGlyph size={32} />
              </div>
              <div className="logo-card dark">
                <div className="logo-card-label">GLYPH · 16px (notif)</div>
                <MapigoGlyph size={16} />
              </div>
              <div className="logo-card dark">
                <div className="logo-card-label">STACKED LOCKUP</div>

              </div>
            </div>
          </div>
        </DCArtboard>

        <DCArtboard id="tile-feature" label="Hub tile — feature (480×600)" width={480} height={600}>
          <HubTilePortrait />
        </DCArtboard>

        <DCArtboard id="tile-small" label="Hub tile — small (320×128)" width={640} height={256}>
          <div className="mockup-tile-small"><div style={{width:320}}><HubTileSmall /></div></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="waveform" title="The waveform — visual spec">
        <DCArtboard id="wf-isolated" label="Waveform in isolation (live mode)" width={1280} height={420}>
          <div style={{padding:32, height:'100%', background:'var(--bg)'}}>
            <MapigoWaveform mode="live" anchors={[
              { t: 0.18, v: 0.85, label: 'SPIKE', state: 'won' },
              { t: 0.55, v: 0.10, label: 'CALM',  state: 'lost' },
              { t: 0.78, v: 0.35, label: 'DRIFT', state: 'pending' },
            ]} roundProgress={0.78} />
          </div>
        </DCArtboard>
        <DCArtboard id="wf-spec-math" label="Waveform — mathematical spec" width={1280} height={420}>
          <div className="spec" style={{padding:32, gap:20}}>
            <div className="spec-grid-2">
              <div className="spec-panel">
                <div className="spec-panel-head">CALM MODE</div>
                <div className="spec-panel-body">
                  <code style={{fontFamily:'var(--font-mono)'}}>
                    y(t) = 0.10·sin(1.6t) + 0.04·sin(0.7t)<br/>
                    amplitude ≤ 20% of canvas height<br/>
                    period ≈ 4.0s primary, 9.0s secondary
                  </code>
                </div>
              </div>
              <div className="spec-panel">
                <div className="spec-panel-head">DRIFT MODE</div>
                <div className="spec-panel-body">
                  <code style={{fontFamily:'var(--font-mono)'}}>
                    y(t) = 0.35·sin(0.4t) + 0.06·sin(1.2t)<br/>
                    slow baseline rise/fall over 3–6s<br/>
                    no peak {`>`} 50% amplitude
                  </code>
                </div>
              </div>
              <div className="spec-panel">
                <div className="spec-panel-head">SPIKE PROFILE</div>
                <div className="spec-panel-body">
                  <code style={{fontFamily:'var(--font-mono)'}}>
                    peak ∈ [0.70, 0.95] amplitude<br/>
                    onset 80ms · decay e^(−t/0.18) → 600ms<br/>
                    cooldown 3–10s before next eligible spike
                  </code>
                </div>
              </div>
              <div className="spec-panel">
                <div className="spec-panel-head">RENDER BUDGET</div>
                <div className="spec-panel-body">
                  <code style={{fontFamily:'var(--font-mono)'}}>
                    SVG path · 240 samples (60s @ 4 Hz)<br/>
                    target 60fps on 3GB Android<br/>
                    will-change: transform · 100KB JS budget
                  </code>
                </div>
              </div>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="components" title="UI components">
        <DCArtboard id="states" label="Round states — open / placed / won / goal" width={1280} height={360}>
          <div style={{padding:24, height:'100%'}}><StateGallery /></div>
        </DCArtboard>
        <DCArtboard id="tray-states" label="PredictionTray — interaction states" width={1280} height={260}>
          <div className="spec" style={{padding:24, gap:18}}>

              <thead><tr><th>COMPONENT</th><th>PURPOSE</th><th>KEY PROPS</th><th>STATES</th></tr></thead>
              <tbody>
                {[
                  ['MapigoWaveform','Live intensity canvas','mode, samples, anchors, roundProgress, paused','live · drift · calm · paused · reduced-motion'],
                  ['RoundBand','Active 60s window overlay','progress, resolved, outcome','open · resolving · won · lost'],
                  ['PredictionTray','3-call CTA tray','pools, selected, disabled, onSelect','default · hover · selected · disabled · winning · losing'],
                  ['MapigoStakeInput','Stake entry tuned to 60s cycles','value, currency, chips, onChange, onPlace','empty · valid · over-balance · placing · placed'],
                  ['RoundResultCard','Settlement card','outcome, mult, won, amt, streak','won · lost · push · refunded'],
                  ['RoundsFeed','Last N rounds + mini-waveforms','rounds[], limit','default · loading · empty'],

                  ['GoalFlash','Full-screen goal override','team, minute','entering · holding · exiting'],
                  ['MapigoLeaderboardMini','Session top-5','entries[], you','default · you-in-list · you-out'],
                  ['OutcomePill','SPIKE/DRIFT/CALM result chip','kind, won','won · lost · pending'],

                  <tr key={i}>

                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="tokens" title="Color tokens (extensions.mapigo)">
