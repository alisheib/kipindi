<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kipindi · Landing v2 · Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="landing-v2/wf.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="landing-v2/wf-shared.jsx"></script>
<script type="text/babel" src="landing-v2/wf-desktop.jsx"></script>
<script type="text/babel" src="landing-v2/wf-tablet.jsx"></script>
<script type="text/babel" src="landing-v2/wf-mobile.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas title="Kipindi · Landing v2 · Wireframes (low-fi · structure)">
      <DCSection id="intro" title="Wireframe set" subtitle="Low-fi structure across three breakpoints — review before hi-fi. Numbered pins map to spec sections.">
        <DCArtboard id="anno" label="Rationale & decisions" width={520} height={3200}>
          <div style={{padding:32,fontFamily:'Inter,sans-serif',fontSize:13,lineHeight:1.55,color:'#1a1f30',background:'#fff',height:'100%'}}>
            <h2 style={{fontFamily:'Sora',fontSize:22,marginBottom:12,letterSpacing:'-0.02em'}}>Decisions · Rationale</h2>
            <p style={{color:'#9aa3b7',marginBottom:24,fontSize:11,fontFamily:'JetBrains Mono',letterSpacing:'0.1em',textTransform:'uppercase'}}>Annotation overlay — read top to bottom</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>① Hero — commit to ONE visual</h3>
            <p>Brief lists 3 candidates (waveform · pool counter · live score). I'm recommending <b>animated Mapigo waveform</b> — it's the signature, it's already in the design system, and pool counter / scoreline can sit inside it as overlay metadata. Keeps the eye on what makes Kipindi different.</p>
            <p style={{marginTop:6}}><b>CLS-safe:</b> hero visual gets a fixed-aspect container (16:9 desktop, 4:3 tablet, 1:1 mobile) reserved before paint. Reduced-motion = single SVG snapshot, no JS.</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>② How it works — pool ≠ odds</h3>
            <p>Three cards explain Kipindi's product mental model in plain English+SW. Critically, copy talks about "the experience" — never the operator's take percentage. That math lives in /legal/terms per your note.</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>③ Live now — real data</h3>
            <p>Tiles read from <code>/api/matches</code>. No fake data, no fake animation. If the API is empty (off-hours), section collapses to a single "Next match in 4h 12m" card — not a fake "live" placeholder. Honest beats animated.</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>④ Numbers — restraint</h3>
            <p>5 stats max, gold tabular numerals, navy slab. No "biggest", no "best", no superlatives. ISO 27001 audit and license number sit alongside paid-out figures so the regulator and the punter both see what they need.</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>⑤ Mapigo — earns its scroll</h3>
            <p>Black background (different from rest of page), animated waveform, prediction tray inline, win-celebration screenshot. This is where Kipindi separates from any TZ competitor — give it room to breathe.</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>⑥ Compliance band</h3>
            <p>Single row above footer: NIDA · mobile-money providers · Gaming Board · 18+ · PDPA. Designed so a regulator sees it within 2 scrolls of any deep-link.</p>

            <h3 style={{fontFamily:'Sora',fontSize:15,marginTop:18,marginBottom:6}}>⑦ Footer — three columns</h3>
            <p>Company / Legal / Help. Mobile collapses to single column. TIN + DSM address visible (regulator). Copyright row carries deploy timestamp + version.</p>

            <div style={{marginTop:24,padding:14,background:'#fffbe6',border:'1px solid #b58a21',borderLeft:'3px solid #b58a21',borderRadius:6}}>
              <b style={{color:'#b58a21'}}>Hand-off to in-app shell:</b> CTA → /auth/demo. Landing has NO bottom nav, NO authenticated chrome. After CTA click, the shell mounts with bottom-nav + balance + KYC banner. Visual continuity: hero waveform morphs into the in-app Mapigo header (250ms cross-fade) so the user "lands" inside the same world.
            </div>

            <div style={{marginTop:18,padding:14,background:'#eef1f6',border:'1px solid #c9cfdb',borderRadius:6}}>
              <b>New tokens needed</b> (for hi-fi pass — proposing values):<br/>
              <code style={{fontSize:11,fontFamily:'JetBrains Mono'}}>--landing-hero-h: 600px (desktop) / 480px (tablet) / 540px (mobile)</code><br/>
              <code style={{fontSize:11,fontFamily:'JetBrains Mono'}}>--mapigo-bg: #000 (deeper than navy, signals "different mode")</code><br/>
              <code style={{fontSize:11,fontFamily:'JetBrains Mono'}}>--trust-strip-h: 32px</code><br/>
              <code style={{fontSize:11,fontFamily:'JetBrains Mono'}}>--compliance-band-h: 56px (desktop) / 96px (mobile, wraps)</code>
            </div>

            <div style={{marginTop:18,padding:14,background:'#eef1f6',border:'1px solid #c9cfdb',borderRadius:6}}>
              <b>FR support</b> — the EN·SW pattern extends to a 3-way toggle: <code>EN · SW · FR</code>. Pair components become tri-lingual blocks; on tight viewports, current language is shown and a "languages" pill toggles. Spec'd in the language-toggle component (to add to design system).
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="desktop" title="Desktop · 1440px" subtitle="Primary breakpoint — manager + regulator review here.">
        <DCArtboard id="wf-desktop" label="Wireframe · 1440 × full" width={1440} height={2900}>
          <WFDesktop />
        </DCArtboard>
      </DCSection>

      <DCSection id="tablet" title="Tablet · 768px" subtitle="iPad portrait — same density adjusted, hero visual moves below CTAs.">
        <DCArtboard id="wf-tablet" label="Wireframe · 768 × full" width={768} height={2400}>
          <WFTablet />
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile · 393px" subtitle="iPhone 14/15 — primary audience. Live tiles scroll horizontally; cards stack; footer single-column.">
        <DCArtboard id="wf-mobile" label="Wireframe · 393 × full" width={393} height={2600}>
          <WFMobile />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
