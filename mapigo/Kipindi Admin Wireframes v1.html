<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Kipindi · Admin · Wireframes v1</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin-wf/awf.css"/>
<style>
  body { margin:0; background:#e9ecf2; font-family:'Inter',system-ui,sans-serif; }
  .awf-annot { background:#fff; border:1px solid #c9cfdb; border-radius:10px; padding:24px; width: 360px; }
  .awf-annot h3 { font-family:'Sora',sans-serif; font-size:13px; letter-spacing:0.16em; text-transform:uppercase; color:#6b7488; margin:18px 0 8px; font-weight:600; }
  .awf-annot h3:first-child { margin-top:0; }
  .awf-annot h2 { font-family:'Sora'; font-size:18px; margin:0 0 6px; }
  .awf-annot p { font-size:12px; line-height:1.55; color:#3a4258; margin:6px 0; }
  .awf-annot ul { margin:6px 0 10px 0; padding-left:18px; }
  .awf-annot li { font-size:12px; line-height:1.5; color:#3a4258; margin-bottom:4px; }
  .awf-annot code { font-family:'JetBrains Mono'; font-size:10.5px; background:#eef1f6; padding:1px 5px; border-radius:3px; }
  .awf-annot .pin-key { display:flex; gap:8px; align-items:flex-start; margin-bottom:6px; font-size:12px; line-height:1.4; }
  .awf-annot .pin-key .n { background:#1e3e94; color:#fff; font-family:'JetBrains Mono'; font-size:10px; font-weight:600; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .awf-cover { padding: 32px; width: 720px; background:#0a1838; color:#fff; border-radius: 12px; }
  .awf-cover h1 { font-family:'Sora'; font-size: 44px; font-weight:700; letter-spacing:-0.03em; margin:0 0 8px; }
  .awf-cover .pair { font-family:'Sora'; font-size:18px; color:#DEBC54; margin-bottom: 28px; }
  .awf-cover h3 { font-family:'JetBrains Mono'; font-size:11px; letter-spacing:0.18em; color:#DEBC54; margin: 22px 0 8px; text-transform:uppercase; font-weight:600; }
  .awf-cover p { font-size:14px; line-height:1.6; color:#cdd3e0; margin:6px 0; max-width: 60ch; }
  .awf-cover .meta { display:flex; gap:32px; margin-top:24px; flex-wrap:wrap; font-family:'JetBrains Mono'; font-size:11px; color:#9aa3b7; }
  .awf-cover .meta b { color:#fff; font-weight:600; display:block; margin-bottom:2px; }
  .dca-stage { background:#e9ecf2; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="admin-wf/design-canvas.jsx"></script>
<script type="text/babel" src="admin-wf/awf-shell.jsx"></script>
<script type="text/babel" src="admin-wf/awf-overview.jsx"></script>
<script type="text/babel" src="admin-wf/awf-finance.jsx"></script>
<script type="text/babel" src="admin-wf/awf-player.jsx"></script>
<script type="text/babel" src="admin-wf/awf-compliance.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Cover() {
  return (
    <div className="awf-cover">
      <div className="pair">Kipindi · staff cockpit</div>
      <h1>Management dashboard wireframes <span style={{color:'#DEBC54'}}>v1</span></h1>
      <p>The four wireframes requested in the brief — Overview, Finance, Per-player drill-down, and Compliance — at the two required widths (1440 desktop primary, 1024 tablet landscape secondary). Low-fi, structure-only. Same Sora / Inter / JBM type, same gold-positive · royal-active · muted-loss palette, same EN+SW pair labels and 'STAFF · CONFIDENTIAL' band on every screen.</p>
      <p>Numbered pins (1, 2, 3…) on each artboard correspond to the right-side annotation cards explaining the section, the analytics queries it needs, and any new components it introduces.</p>

      <div className="meta">
        <div><b>Audience</b>operators · compliance · finance · founder · regulator</div>
        <div><b>Widths</b>1440 primary · 1024 secondary</div>
        <div><b>Theme</b>light shown · dark canonical · token-driven swap</div>
        <div><b>Stage</b>WIREFRAME · hi-fi follows your sign-off</div>
      </div>
    </div>
  );
}

function OverviewNotes() {
  return (
    <div className="awf-annot">
      <h2>/admin · Overview cockpit</h2>
      <p>The single screen the founder opens at 8am. Header KPI strip → money flow + activity → secondary tiles. Three horizontal bands; nothing competes for attention.</p>

      <h3>Pin 1 · KPI strip</h3>
      <p>Four equal tiles. Active players · GGR · NGR · AML pending. Each shows count, 7-day sparkline, delta vs yesterday. AML pending pulses gold when {">"} 0.</p>
      <p><b>Queries needed:</b> <code>activePlayersInWindow(24h)</code>, <code>ggrInWindow(24h)</code>, <code>ngrInWindow(24h)</code>, <code>countAmlPending()</code>, plus 7-day daily series for each spark.</p>

      <h3>Pin 2 · Money flow + feed</h3>
      <p>Stacked area: deposits + bets above zero, withdrawals + payouts below. Activity feed is the last 20 audit entries, polled every 5s, click-through to <code>/admin/audit?actorId=…</code>. "View as table" toggle on the chart for a11y.</p>
      <p><b>New component:</b> <code>SignedAreaChart</code> (props: series[], yLabel, xRange, mirrored:bool).</p>

      <h3>Pin 3 · Secondary tiles</h3>
      <p>KYC mini-funnel · provider mix · self-exclusion · match-integrity. Each is a click-through summary, not the source of truth.</p>
    </div>
  );
}

function FinanceNotes() {
  return (
    <div className="awf-annot">
      <h2>/admin/finance</h2>
      <p>Where finance + the regulator look. Period picker pinned top-right; everything below recomputes against that range. CSV is regulator-formatted, PDF is the operator monthly.</p>

      <h3>Pin 1 · KPI 7-up</h3>
      <p>Two rows of four. Top row: Deposits · Withdrawals · GGR · NGR. Second row: Tax accrued (5% TRA withholding) · Operator margin % · Wallet liability (sum of all wallet balances, real-time) · Players paid.</p>
      <p><b>Queries:</b> <code>depositsInRange</code>, <code>withdrawalsInRange</code>, <code>ggrInRange</code>, <code>ngrInRange</code>, <code>taxAccruedInRange</code>, <code>operatorMarginInRange</code>, <code>walletLiabilityNow()</code>.</p>

      <h3>Pin 2 · Charts row</h3>
      <p>Net flow (area), operator margin (line w/ 7–10% reference band), provider mix (stacked bar), top-10 player concentration (horizontal bars, anonymised IDs, risk-flag indicator next to whales).</p>

      <h3>Pin 3 · Provider table</h3>
      <p>Per-provider summary feeding the GBT monthly export. Mirrors the schema TRA expects so we can ship CSV directly from this view.</p>
      <p><b>New component:</b> <code>RegulatorExportButton</code> (template, range, signature) — produces signed JSON receipt for audit.</p>
    </div>
  );
}

function PlayerNotes() {
  return (
    <div className="awf-annot">
      <h2>/admin/players/[id]</h2>
      <p>Everything about one player on one page. Identity card → quick stats → tabs → privileged actions. The stickiness is intentional: an officer never leaves this page during a case.</p>

      <h3>Pin 1 · Identity card</h3>
      <p>Avatar · name · phone (masked) · status / KYC / NIDA chips · risk score (0–100, gold). Risk score is computed server-side from rapid-deposit cycling, late-night play, declined cards, breached limits.</p>
      <p><b>Query:</b> <code>computeRiskScore(userId)</code>; persisted nightly, recomputed live on flagged events.</p>

      <h3>Pin 2 · Quick stats</h3>
      <p>Lifetime deposit / withdrawal / NGR / bet count. Same KPI tile as Overview but compact.</p>

      <h3>Pin 3 · Tabs</h3>
      <p>Activity · Bets · Transactions · KYC · Limits · Self-exclusion · Audit. Underlined tabs (existing component). Activity is default; everything else paginates.</p>

      <h3>Pin 4 · Two-person approval</h3>
      <p>Sticky action bar at the bottom. Reason field required on every action. Wallet/KYC/refund actions enter the approval queue; only after a second compliance officer countersigns within 30m does the action execute. The queue is shown inline so officers know whether the request is live.</p>
      <p><b>New component:</b> <code>TwoPersonApprovalQueue</code> (request, requester, expires, second-officer slot, audit trail).</p>
    </div>
  );
}

function ComplianceNotes() {
  return (
    <div className="awf-annot">
      <h2>/admin/compliance</h2>
      <p>The page the regulator sees first on inspection. Pristine. Defensible. Top row is the integrity proof; everything below is the standard responsible-gambling and reporting surface.</p>

      <h3>Pin 1 · Integrity proof</h3>
      <p>Audit-chain status (green if <code>verifyChain()</code> passes, red with break-point + entry id if not) and backup status (last snapshot timestamp + rolling history). These are at the very top so any inspector sees them within five seconds of opening the page.</p>

      <h3>Pin 2 · KYC funnel + AML queue</h3>
      <p>Real funnel chart with conversion % between steps. AML queue summarised as 4 KPIs + the next two items in the queue inline.</p>
      <p><b>New component:</b> <code>FunnelChart</code> (steps[], conversionLabels:bool, dropOffSide). SVG-only, matches existing chart system.</p>

      <h3>Pin 3 · Responsible-gambling row</h3>
      <p>Self-exclusion · cooling-off · limit-increase deferrals · reality-check engagement. Reality-check is a thin stacked bar of continued / break / self-excluded.</p>

      <h3>Pin 4 · Match integrity + reports</h3>
      <p>Last 30 days of match-integrity alerts (Sportradar feed) and the six regulator export templates. Each export emits a signed JSON receipt logged to the audit chain.</p>
    </div>
  );
}

function ComponentsNotes() {
  return (
    <div className="awf-annot">
      <h2>New components needed</h2>
      <p>Every new chart is SVG-only and matches the existing <code>charts/</code> patterns — no third-party libs.</p>
      <ul>
        <li><b>SignedAreaChart</b> — stacked area mirrored above/below zero. Used by Overview money-flow and Finance net-flow.</li>
        <li><b>FunnelChart</b> — multi-step funnel with per-step conversion labels and lateral drop-off counts. Used by Compliance KYC funnel.</li>
        <li><b>DonutChart</b> — for Mapigo SPIKE / DRIFT / CALM call distribution. Centre label, legend below.</li>
        <li><b>StackedBarSeries</b> — provider mix over time. Time on x, % stack on y.</li>
        <li><b>HorizontalBarChart</b> — top-10 concentration with risk-flag indicator next to label.</li>
        <li><b>TimeRangePicker</b> — single component pinned top-right of every page that has one. Presets + custom range.</li>
        <li><b>TwoPersonApprovalQueue</b> — request card with requester, expires-in countdown, second-officer slot, reason, audit-id.</li>
        <li><b>RegulatorExportButton</b> — template selector + period + signed-JSON receipt. Produces audit entry on every export.</li>
        <li><b>ConfidentialBand</b> — top-of-page band, bilingual EN/SW/FR; required on every staff route.</li>
      </ul>

      <h3>Information architecture</h3>
      <p>Left nav grouped by mental model: <b>Overview · Money · Players · Games · Compliance · System</b>. Each top-level destination has at most three children; deeper navigation lives inside the page (tabs, drill-downs) — not in the sidebar.</p>
      <p>Breadcrumbs show real hierarchy (<code>Admin / Players / Neema Mwangosi</code>); not faux trails. Search is global (⌘K) and indexes players, audit entries, transaction ids, match ids, audit categories.</p>

      <h3>Hand-off priority order</h3>
      <ol style={{paddingLeft:18,fontSize:12,lineHeight:1.55,color:'#3a4258'}}>
        <li>Aggregation queries: GGR / NGR / wallet liability / provider mix / KYC funnel.</li>
        <li><code>SignedAreaChart</code> + <code>FunnelChart</code> + <code>TimeRangePicker</code>.</li>
        <li>Overview cockpit page wiring (read-only).</li>
        <li>Finance page + CSV export to GBT/TRA format.</li>
        <li>Per-player drill-down + <code>TwoPersonApprovalQueue</code> wired to existing AML approval flow.</li>
        <li>Compliance page (integrity proof first, then funnel, then exports).</li>
        <li>Games + System + Reports — once the patterns above are confirmed.</li>
      </ol>
    </div>
  );
}

const ROOT = ReactDOM.createRoot(document.getElementById('root'));
ROOT.render(
  <DesignCanvas title="Kipindi · Admin · Wireframes v1" subtitle="Overview · Finance · Per-player · Compliance · 1440 + 1024">
    <DCSection id="cover" title="Cover · brief recap">
      <DCArtboard id="cover" label="Cover" width={720} height={420}><Cover/></DCArtboard>
    </DCSection>

    <DCSection id="overview" title="1 · /admin · Overview cockpit">
      <DCArtboard id="ov-1440" label="Overview · 1440" width={1440} height={900} screenLabel="01 Overview · 1440"><WFOverview size={1440}/></DCArtboard>
      <DCArtboard id="ov-1024" label="Overview · 1024" width={1024} height={1080} screenLabel="01 Overview · 1024"><WFOverview size={1024}/></DCArtboard>
      <DCArtboard id="ov-notes" label="Annotations" width={400} height={900}><OverviewNotes/></DCArtboard>
    </DCSection>

    <DCSection id="finance" title="2 · /admin/finance">
      <DCArtboard id="fi-1440" label="Finance · 1440" width={1440} height={1280} screenLabel="02 Finance · 1440"><WFFinance size={1440}/></DCArtboard>
      <DCArtboard id="fi-1024" label="Finance · 1024" width={1024} height={1480} screenLabel="02 Finance · 1024"><WFFinance size={1024}/></DCArtboard>
      <DCArtboard id="fi-notes" label="Annotations" width={400} height={1280}><FinanceNotes/></DCArtboard>
    </DCSection>

    <DCSection id="player" title="3 · /admin/players/[id]">
      <DCArtboard id="pl-1440" label="Player · 1440" width={1440} height={980} screenLabel="03 Player · 1440"><WFPlayer size={1440}/></DCArtboard>
      <DCArtboard id="pl-1024" label="Player · 1024" width={1024} height={1100} screenLabel="03 Player · 1024"><WFPlayer size={1024}/></DCArtboard>
      <DCArtboard id="pl-notes" label="Annotations" width={400} height={980}><PlayerNotes/></DCArtboard>
    </DCSection>

    <DCSection id="compliance" title="4 · /admin/compliance">
      <DCArtboard id="co-1440" label="Compliance · 1440" width={1440} height={1180} screenLabel="04 Compliance · 1440"><WFCompliance size={1440}/></DCArtboard>
      <DCArtboard id="co-1024" label="Compliance · 1024" width={1024} height={1380} screenLabel="04 Compliance · 1024"><WFCompliance size={1024}/></DCArtboard>
      <DCArtboard id="co-notes" label="Annotations" width={400} height={1180}><ComplianceNotes/></DCArtboard>
    </DCSection>

    <DCSection id="system" title="System · components · IA · hand-off">
      <DCArtboard id="comp-notes" label="Components + IA + hand-off" width={400} height={900}><ComponentsNotes/></DCArtboard>
    </DCSection>
  </DesignCanvas>
);
</script>

</body>
</html>
