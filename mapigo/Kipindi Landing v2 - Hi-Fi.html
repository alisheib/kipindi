<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kipindi · Landing v2 · Hi-Fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="landing-v2/lp.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="landing-v2/lp.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard, LandingPage } = window;

function App() {
  return (
    <DesignCanvas title="Kipindi · Landing v2 · Hi-Fi">
      <DCSection id="dark-d" title="Dark theme · Desktop 1440" subtitle="Primary view — manager + regulator review.">
        <DCArtboard id="dark-desktop" label="Dark · 1440" width={1440} height={4400}>
          <LandingPage theme="dark" size="desktop"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="light-d" title="Light theme · Desktop 1440" subtitle="Pixel-equivalent of dark — same hierarchy, AA contrast.">
        <DCArtboard id="light-desktop" label="Light · 1440" width={1440} height={4400}>
          <LandingPage theme="light" size="desktop"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="tablet" title="Tablet · 768" subtitle="Same hierarchy — hero stacks, fixtures 2-up, footer 2-col.">
        <DCArtboard id="dark-tablet"  label="Dark · 768"  width={768} height={4200}>
          <LandingPage theme="dark" size="tablet"/>
        </DCArtboard>
        <DCArtboard id="light-tablet" label="Light · 768" width={768} height={4200}>
          <LandingPage theme="light" size="tablet"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile · 393" subtitle="Primary audience. Live tiles scroll horizontally; cards stack; footer single-column.">
        <DCArtboard id="dark-mobile"  label="Dark · 393"  width={393} height={4500}>
          <LandingPage theme="dark" size="mobile"/>
        </DCArtboard>
        <DCArtboard id="light-mobile" label="Light · 393" width={393} height={4500}>
          <LandingPage theme="light" size="mobile"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="notes" title="Component breakdown · token mapping" subtitle="What new tokens this landing needs added to DESIGN_SYSTEM v1.0.">
        <DCArtboard id="tokens-todo" label="New tokens · TODO for design-system v1.1" width={760} height={780}>
          <div style={{padding:36,fontFamily:'Inter,sans-serif',fontSize:13,lineHeight:1.6,color:'#1a1f30',background:'#fff',height:'100%'}}>
            <h2 style={{fontFamily:'Sora',fontSize:24,letterSpacing:'-0.02em',marginBottom:8}}>New tokens · TODO</h2>
            <p style={{color:'#9aa3b7',fontFamily:'JetBrains Mono',fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:24}}>Add to DESIGN_SYSTEM v1.1 — proposed values</p>

            <div style={{marginBottom:18}}>
              <h3 style={{fontFamily:'Sora',fontSize:15,marginBottom:6}}>Layout</h3>
              <div style={{fontFamily:'JetBrains Mono',fontSize:12,background:'#eef1f6',padding:12,borderRadius:6,lineHeight:1.8}}>
                --landing-hero-h-d: 640px<br/>
                --landing-hero-h-t: 520px<br/>
                --landing-hero-h-m: 540px<br/>
                --trust-strip-h:    36px<br/>
                --section-pad-d:    96px 56px<br/>
                --section-pad-t:    64px 32px<br/>
                --section-pad-m:    56px 18px
              </div>
            </div>

            <div style={{marginBottom:18}}>
              <h3 style={{fontFamily:'Sora',fontSize:15,marginBottom:6}}>Surfaces</h3>
              <div style={{fontFamily:'JetBrains Mono',fontSize:12,background:'#eef1f6',padding:12,borderRadius:6,lineHeight:1.8}}>
                --mapigo-bg: #000000  <span style={{color:'#9aa3b7'}}>/* deeper than navy → "different mode" */</span><br/>
                --gold-soft: rgba(181,138,33,0.14) <span style={{color:'#9aa3b7'}}>/* light */</span><br/>
                --gold-soft: rgba(222,188,84,0.12) <span style={{color:'#9aa3b7'}}>/* dark  */</span><br/>
                --royal-soft: rgba(30,62,148,0.10) <span style={{color:'#9aa3b7'}}>/* light */</span><br/>
                --royal-soft: rgba(79,112,194,0.18) <span style={{color:'#9aa3b7'}}>/* dark  */</span>
              </div>
            </div>

            <div style={{marginBottom:18}}>
              <h3 style={{fontFamily:'Sora',fontSize:15,marginBottom:6}}>Components mapped</h3>
              <ul style={{paddingLeft:18,color:'#475066'}}>
                <li><b>Logo</b> → existing <code>LogoSpec</code> (270° royal arc + gold dot)</li>
                <li><b>Button.Primary</b> → existing <code>btn.primary.gold</code></li>
                <li><b>Button.Secondary</b> → existing <code>btn.outline</code></li>
                <li><b>Card</b> → existing <code>surface.elev1</code></li>
                <li><b>FixtureTile</b> → uses existing <code>FixtureCard</code> (no change)</li>
                <li><b>Waveform</b> → existing <code>MapigoWave</code> from Mapigo spec</li>
                <li><b>LangToggle</b> → <span style={{color:'#b58a21',fontWeight:600}}>NEW</span> · 3-way (EN·SW·FR), needs adding</li>
                <li><b>TrustItem pill</b> → <span style={{color:'#b58a21',fontWeight:600}}>NEW</span> · variant of <code>chip.outline</code></li>
                <li><b>ComplianceItem</b> → <span style={{color:'#b58a21',fontWeight:600}}>NEW</span> · 28×28 icon + uppercase label</li>
                <li><b>NumberStat</b> → <span style={{color:'#b58a21',fontWeight:600}}>NEW</span> · gold tabular numerals + EN/SW pair</li>
              </ul>
            </div>

            <div style={{padding:14,background:'#fffbe6',border:'1px solid #b58a21',borderLeft:'3px solid #b58a21',borderRadius:6,fontSize:12}}>
              <b style={{color:'#b58a21'}}>Hand-off to in-app shell:</b><br/>
              CTA → /auth/demo. The hero waveform DOM-id stays consistent so the in-app Mapigo header can mount with a 250ms cross-fade. Bottom nav appears only after the auth shell loads. Landing has zero authenticated chrome.
            </div>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
