<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>50pick — Features (matched palette)</title>
<link rel="stylesheet" href="kit50.css" />
<style>
  html, body { margin: 0; padding: 0; background: oklch(13% 0.045 264); }
  #root { width: 100vw; height: 100vh; }
  body { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="400" rx="40" fill="#161430"/>
    <rect x="112" y="150" width="176" height="116" rx="14" fill="#231f44" stroke="#3a3566" stroke-width="2"/>
    <rect x="130" y="206" width="140" height="7" rx="3.5" fill="#0f0d24"/>
    <rect x="130" y="206" width="84" height="7" rx="3.5" fill="#2f9e6a"/>
    <rect x="212" y="201" width="3" height="17" rx="1.5" fill="#e8c878"/>
    <rect x="130" y="226" width="66" height="28" rx="8" fill="#2f9e6a"/>
    <rect x="204" y="226" width="66" height="28" rx="8" fill="#cf5560"/>
    <text x="200" y="130" font-family="sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">50pick</text>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="kit50.jsx"></script>
<script type="text/babel" src="features.jsx"></script>
<script type="text/babel">
  function FeaturesApp() {
    return (
      <DesignCanvas>
        <DCSection id="grid" title="Pick a side now" subtitle="Recreated from your live platform — your exact navy / green / red / gold, conviction needle, flat YES·NO buttons.">
          <DCArtboard id="pickaside" label="Live market grid + how it works" width={1340} height={760} style={{ background: 'var(--bg)' }}><PickASide /></DCArtboard>
        </DCSection>
        <DCSection id="hover" title="Card hover — locked: blue" subtitle="Decision: blue frame. Keeps hover cohesive with the canvas and protects gold for win/payout moments. (Gold shown for reference.)">
          <DCArtboard id="hovercompare" label="Hover frame — blue chosen" width={820} height={620} style={{ background: 'var(--bg)' }}><HoverCompare /></DCArtboard>
        </DCSection>
        <DCSection id="btn" title="Buttons" subtitle="The enhancement — sportsbook price-chip YES·NO, gold confirm, chrome system.">
          <DCArtboard id="buttons" label="Button system + states" width={720} height={560} style={{ background: 'var(--bg)' }}><ButtonShowcase /></DCArtboard>
          <DCArtboard id="buytray" label="Buy tray" width={420} height={560} style={{ background: 'var(--bg)' }}><BuyTray /></DCArtboard>
        </DCSection>
        <DCSection id="objects" title="Market objects" subtitle="Positions, leaderboard, resolution — all on the matched palette.">
          <DCArtboard id="poslead" label="Positions + leaderboard" width={680} height={620} style={{ background: 'var(--bg)' }}><PositionsLeaderboard /></DCArtboard>
          <DCArtboard id="resolve" label="Resolution panel" width={540} height={560} style={{ background: 'var(--bg)' }}><ResolutionPanel /></DCArtboard>
        </DCSection>
        <DCSection id="moments" title="Resolution moments + toasts" subtitle="Win (gold, rolling counter) · loss (calm) · toast stack. No casino imagery.">
          <DCArtboard id="winloss" label="Win · Loss · Toasts" width={720} height={760} style={{ background: 'var(--bg)' }}><WinLoss /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<FeaturesApp />);
</script>
</body>
</html>
