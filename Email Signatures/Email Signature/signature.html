  Paste-ready source. Two ways to install:

  A) Gmail / Apple Mail / most web clients — open `signature-preview.html`,
     hit the "Copy" button, paste into the signature box. (Easiest.)

  B) Outlook / templating systems — use the markup below directly.

  Fonts: Sora / JetBrains Mono / Inter with safe fallbacks (Segoe UI,
  Courier New, Arial). Most mail clients won't load web fonts; the
  layout, mark and colors hold on the fallbacks.

  Mark: inline SVG — crisp at any zoom, no hosted image needed. If a
  client strips inline SVG (older desktop Outlook), replace the entire
  <svg>…</svg> with:
    <img src="https://50pick.tz/icons/mark-color-512.png" width="74" height="74" alt="50pick">
  (point it at the kit's mark-color-512.png).

  Swap per person: the name, role, mailto + email text, phone, and the
  city in the location line. Keep the brand colors, the tagline, and the
  ".tz" suffix as-is.
-->
